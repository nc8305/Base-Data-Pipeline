name: CI/CD Pipeline - Build and Push to Harbor

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # Tên image và tag
  IMAGE_NAME: iot-producer
  # Lấy Harbor Registry URL từ GitHub Secrets
  REGISTRY: ${{ secrets.HARBOR_URL }} 
  # Tên project trên Harbor
  PROJECT_NAME: capstone

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build, Login and Push via Inline Script
        env:
          HARBOR_URL: ${{ secrets.HARBOR_URL }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
          PROJECT_NAME: capstone
          IMAGE_NAME: iot-producer
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -e
          
          # Đảm bảo các biến cần thiết đã được set
          if [ -z "$HARBOR_PASSWORD" ] || [ -z "$HARBOR_USERNAME" ]; then
            echo "Error: HARBOR_USERNAME and HARBOR_PASSWORD must be set in GitHub Secrets."
            exit 1
          fi

          FULL_IMAGE_NAME="${HARBOR_URL}/${PROJECT_NAME}/${IMAGE_NAME}:${IMAGE_TAG}"
          LATEST_IMAGE_NAME="${HARBOR_URL}/${PROJECT_NAME}/${IMAGE_NAME}:latest"

          echo "1. LOGGING INTO HARBOR REGISTRY ($HARBOR_URL)"
          echo "$HARBOR_PASSWORD" | docker login "$HARBOR_URL" -u "$HARBOR_USERNAME" --password-stdin

          echo "2. BUILDING DOCKER IMAGE"
          docker build -t "$FULL_IMAGE_NAME" -t "$LATEST_IMAGE_NAME" -f Dockerfile .

          echo "3. PUSHING TO HARBOR"
          docker push "$FULL_IMAGE_NAME"
          docker push "$LATEST_IMAGE_NAME"

          echo "SUCCESS! Images pushed:"
          echo " - $FULL_IMAGE_NAME"
          echo " - $LATEST_IMAGE_NAME"
