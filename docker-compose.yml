services:
  # ==========================================
  # 1. MESSAGE QUEUE (Apache Kafka KRaft Mode)
  # ==========================================
  kafka:
    image: apache/kafka:latest
    container_name: iot-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT

  # ==========================================
  # 2. STREAM PROCESSING & HPC (Apache Flink Cluster)
  # ==========================================
  jobmanager:
    image: flink:1.18.1-java11
    container_name: flink-jobmanager
    ports:
      - "8081:8081" # Flink Web UI
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager

  taskmanager:
    image: flink:1.18.1-java11
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 2 # Chạy 2 TaskManager để mô phỏng xử lý phân tán (HPC)
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4 # Mỗi TaskManager có 4 slots để xử lý song song

  # ==========================================
  # 3. TIME-SERIES DATABASE (InfluxDB v2)
  # ==========================================
  influxdb:
    image: influxdb:2.7
    container_name: iot-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=iot_org
      - DOCKER_INFLUXDB_INIT_BUCKET=iot_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb-data:/var/lib/influxdb2

  # ==========================================
  # 4. IOT DATA PRODUCER (Python script)
  # ==========================================
  iot-producer:
    build: .
    container_name: iot-producer
    depends_on:
      - kafka
    environment:
      - KAFKA_BROKER=kafka:29092 # Trỏ tới internal listener của Kafka

volumes:
  influxdb-data:
